<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumaê - Gestão de Joalharia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --luma: #26c6da; }
        .bg-luma { background-color: var(--luma); }
        .text-luma { color: var(--luma); }
        input:focus { border-color: var(--luma) !important; outline: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <!-- Ecrã de Login -->
    <div id="loginSection" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center">
            <div class="w-20 h-20 bg-cyan-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-gem text-3xl text-luma"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 mb-2 uppercase tracking-tighter">Acesso Lumaê</h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8">Introduza as suas credenciais</p>
            
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="UTILIZADOR" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold uppercase text-sm">
                <input type="password" id="passInput" placeholder="PALAVRA-PASSE" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl font-bold text-sm">
                <p id="errorMsg" class="text-red-500 text-[10px] font-black uppercase hidden">Credenciais Incorretas!</p>
                <button onclick="tentarLogin()" class="w-full bg-luma text-white py-4 rounded-2xl font-black shadow-lg shadow-cyan-200 hover:opacity-90 transition uppercase tracking-widest text-sm">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Interface Principal (Oculta por defeito) -->
    <div id="mainApp" class="hidden min-h-screen">
        <nav class="bg-luma p-4 text-white shadow-md sticky top-0 z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <span class="font-black text-xl tracking-tighter uppercase">Lumaê</span>
                <div class="flex items-center gap-4">
                    <span id="userNameDisplay" class="text-[10px] font-bold uppercase bg-white/20 px-3 py-1 rounded-full"></span>
                    <button onclick="logout()" class="text-white/80 hover:text-white"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </nav>

        <header class="p-6 max-w-7xl mx-auto">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-black text-slate-800">Ordens de Serviço</h2>
                    <p class="text-slate-500 text-xs font-medium uppercase tracking-widest">Gestão de Oficina</p>
                </div>
                <button onclick="abrirModal()" class="bg-luma text-white px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-lg shadow-cyan-100 active:scale-95 transition">
                    Nova OS
                </button>
            </div>
        </header>

        <main class="p-6 max-w-7xl mx-auto">
            <div id="kanban" class="flex gap-6 overflow-x-auto pb-10 snap-x">
                <!-- Colunas serão geradas aqui -->
            </div>
        </main>
    </div>

    <!-- Modal Adicionar -->
    <div id="modalOS" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl p-8 shadow-2xl relative">
            <button onclick="fecharModal()" class="absolute right-6 top-6 text-slate-300 hover:text-slate-600"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-black text-slate-800 mb-6 uppercase">Registar Nova OS</h3>
            
            <form id="osForm" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="osId" placeholder="Nº DA OS" required class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl font-bold text-sm uppercase">
                    <input type="text" id="osCliente" placeholder="CLIENTE" required class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl font-bold text-sm uppercase">
                </div>
                <input type="text" id="osDesc" placeholder="DESCRIÇÃO DO SERVIÇO" required class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl font-medium text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="osValor" placeholder="VALOR R$" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl font-bold text-sm">
                    <input type="tel" id="osTel" placeholder="TEL (WHATSAPP)" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl font-bold text-sm">
                </div>
                <button type="submit" class="w-full bg-luma text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Guardar OS</button>
            </form>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES DE ACESSO
        const LOGIN_CORRETO = "adm-mary";
        const SENHA_CORRETA = "818681";

        const COLUNAS = [
            { id: 'loja', label: 'Na Loja', color: 'bg-blue-500' },
            { id: 'ourives', label: 'Oficina', color: 'bg-purple-500' },
            { id: 'pronto', label: 'Finalizado', color: 'bg-green-500' }
        ];

        let baseDeDados = JSON.parse(localStorage.getItem('lumae_db') || '[]');

        // LÓGICA DE LOGIN
        function tentarLogin() {
            const user = document.getElementById('userInput').value.trim().toLowerCase();
            const pass = document.getElementById('passInput').value.trim();

            if (user === LOGIN_CORRETO && pass === SENHA_CORRETA) {
                localStorage.setItem('lumae_sessao', 'ativa');
                localStorage.setItem('lumae_user_nome', 'Mary (ADM)');
                mostrarApp();
            } else {
                const err = document.getElementById('errorMsg');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        }

        function mostrarApp() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = localStorage.getItem('lumae_user_nome');
            renderizarKanban();
        }

        function logout() {
            localStorage.removeItem('lumae_sessao');
            location.reload();
        }

        // VERIFICAÇÃO AUTOMÁTICA AO CARREGAR
        window.onload = () => {
            if (localStorage.getItem('lumae_sessao') === 'ativa') {
                mostrarApp();
            }
        };

        // GESTÃO DE MODAL E DADOS
        function abrirModal() { document.getElementById('modalOS').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modalOS').classList.add('hidden'); }

        document.getElementById('osForm').onsubmit = (e) => {
            e.preventDefault();
            const novaOS = {
                uid: Date.now(),
                id: document.getElementById('osId').value,
                cliente: document.getElementById('osCliente').value,
                desc: document.getElementById('osDesc').value,
                valor: document.getElementById('osValor').value,
                tel: document.getElementById('osTel').value,
                status: 'loja',
                data: new Date().toLocaleDateString('pt-PT')
            };
            baseDeDados.push(novaOS);
            salvar();
            fecharModal();
            e.target.reset();
        };

        function salvar() {
            localStorage.setItem('lumae_db', JSON.stringify(baseDeDados));
            renderizarKanban();
        }

        function mudarStatus(uid, novoStatus) {
            const index = baseDeDados.findIndex(o => o.uid === uid);
            if(index !== -1) {
                baseDeDados[index].status = novoStatus;
                salvar();
            }
        }

        function excluir(uid) {
            if(confirm("Deseja apagar esta OS?")) {
                baseDeDados = baseDeDados.filter(o => o.uid !== uid);
                salvar();
            }
        }

        function renderizarKanban() {
            const container = document.getElementById('kanban');
            container.innerHTML = '';

            COLUNAS.forEach(col => {
                const filtradas = baseDeDados.filter(o => o.status === col.id);
                let cardsHtml = filtradas.map(os => `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-3">
                        <div class="flex justify-between items-start">
                            <span class="text-[10px] font-black text-luma bg-cyan-50 px-2 py-1 rounded-lg">#${os.id}</span>
                            <span class="text-[9px] text-slate-300 font-bold">${os.data}</span>
                        </div>
                        <h4 class="font-black text-slate-800 uppercase text-sm">${os.cliente}</h4>
                        <p class="text-xs text-slate-500 font-medium line-clamp-2">${os.desc}</p>
                        <div class="flex gap-2 pt-2 border-t border-slate-50">
                            ${col.id !== 'loja' ? `<button onclick="mudarStatus(${os.uid}, 'loja')" class="p-2 bg-slate-100 rounded-lg text-[10px]"><i class="fas fa-arrow-left"></i></button>` : ''}
                            ${col.id !== 'ourives' ? `<button onclick="mudarStatus(${os.uid}, 'ourives')" class="p-2 bg-purple-50 text-purple-600 rounded-lg text-[10px] font-bold uppercase flex-1">Oficina</button>` : ''}
                            ${col.id !== 'pronto' ? `<button onclick="mudarStatus(${os.uid}, 'pronto')" class="p-2 bg-green-50 text-green-600 rounded-lg text-[10px] font-bold uppercase flex-1">Pronto</button>` : ''}
                            <button onclick="excluir(${os.uid})" class="p-2 text-rose-300 hover:text-rose-500"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');

                container.innerHTML += `
                    <div class="min-w-[300px] w-[300px] snap-center">
                        <div class="flex items-center gap-2 mb-4">
                            <div class="w-2 h-2 rounded-full ${col.color}"></div>
                            <h3 class="font-black text-slate-400 text-xs uppercase tracking-widest">${col.label}</h3>
                            <span class="ml-auto bg-slate-200 text-slate-500 text-[10px] px-2 py-0.5 rounded-full font-bold">${filtradas.length}</span>
                        </div>
                        <div class="space-y-4">${cardsHtml}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
