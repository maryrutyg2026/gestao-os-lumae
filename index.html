<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ourives Lumaê - Sistema Profissional</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lumaê OS">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --luma-blue: #26c6da; 
            --luma-blue-dark: #00acc1;
        }
        .bg-luma { background-color: var(--luma-blue); }
        .text-luma { color: var(--luma-blue); }
        .border-luma { border-color: var(--luma-blue); }
        .hover-luma:hover { background-color: var(--luma-blue-dark); }
        
        body {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .os-card { transition: all 0.25s ease; border-left-width: 4px; }
        .os-card:active { transform: scale(0.98); }
        .prazo-vencido { background-color: #fff1f2; border-color: #ef4444 !important; }
        
        .kanban-col { 
            min-width: 280px; 
            max-width: 280px; 
        }
        @media (max-width: 640px) {
            .kanban-col { 
                min-width: 85vw; 
                max-width: 85vw; 
            }
        }

        .photo-preview { 
            width: 100%; 
            height: 150px; 
            object-fit: cover; 
            border-radius: 12px;
            display: none;
        }

        #loadingOverlay {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased overflow-x-hidden">

    <div id="toast" class="bg-slate-800 text-white px-6 py-3 rounded-full text-xs font-bold shadow-2xl uppercase tracking-widest"></div>

    <!-- Ecrã de Carregamento -->
    <div id="loadingOverlay" class="fixed inset-0 z-[200] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-luma mb-2"></div>
            <p class="text-[10px] font-black text-luma uppercase tracking-widest">Iniciando Lumaê...</p>
        </div>
    </div>

    <!-- Ecrã de Login -->
    <div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center border border-slate-100">
            <i class="fas fa-gem text-5xl text-luma mb-6 drop-shadow-lg"></i>
            <h2 class="text-2xl font-black text-slate-800 mb-1 tracking-tighter uppercase">Painel Ourives</h2>
            <p class="text-slate-400 text-[10px] mb-8 font-medium uppercase tracking-widest">Acesso Restrito Lumaê</p>
            
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-4 text-slate-300"></i>
                    <input type="text" id="loginUser" placeholder="UTILIZADOR" class="w-full border-slate-100 bg-slate-50 rounded-2xl p-4 pl-12 focus:ring-2 focus:ring-luma outline-none transition font-bold uppercase text-sm">
                </div>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-4 text-slate-300"></i>
                    <input type="password" id="loginPass" placeholder="SENHA" class="w-full border-slate-100 bg-slate-50 rounded-2xl p-4 pl-12 focus:ring-2 focus:ring-luma outline-none transition font-bold text-sm">
                </div>
                
                <p id="loginErrorMessage" class="text-red-500 text-[10px] font-black hidden uppercase tracking-wide">Credenciais Inválidas!</p>
                
                <button onclick="handleLogin()" class="w-full bg-luma text-white py-4 rounded-2xl font-black shadow-xl shadow-cyan-200 hover-luma transition uppercase tracking-widest text-sm mt-4">Entrar no Sistema</button>
            </div>
            <p class="mt-6 text-[8px] text-slate-300 uppercase tracking-widest">v2.2 - Login Atualizado</p>
        </div>
    </div>

    <!-- Interface Principal -->
    <div id="appInterface" class="hidden">
        <nav class="bg-luma text-white p-4 shadow-lg sticky top-0 z-40">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-white/20 p-2 rounded-lg"><i class="fas fa-gem"></i></div>
                    <h1 class="text-xl font-black tracking-tighter uppercase">Lumaê</h1>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleModal('modalNovaOS')" class="bg-white text-luma px-4 py-2 rounded-xl font-black transition flex items-center gap-2 text-[11px] shadow-md uppercase active:scale-95">
                        <i class="fas fa-plus"></i> <span class="hidden sm:inline">Nova OS</span>
                    </button>
                    <button onclick="logout()" class="bg-white/10 hover:bg-white/20 w-10 h-10 rounded-xl transition flex items-center justify-center">
                        <i class="fas fa-power-off text-sm"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="p-4 md:p-8 max-w-7xl mx-auto">
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-8" id="statsContainer"></div>
            <div class="flex flex-row gap-6 overflow-x-auto pb-8 snap-x">
                <div id="kanbanBoard" class="flex gap-6"></div>
            </div>
        </main>
    </div>

    <!-- Modal Nova OS -->
    <div id="modalNovaOS" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-8 border border-slate-100 relative">
            <button onclick="toggleModal('modalNovaOS')" class="absolute right-6 top-6 text-slate-300 hover:text-slate-600 transition"><i class="fas fa-times text-xl"></i></button>
            <h2 class="text-2xl font-black text-slate-800 mb-6 uppercase tracking-tight">Novo Registro de OS</h2>
            <form id="formOS" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Número da OS</label>
                        <input type="text" id="os_id" placeholder="Ex: 1234" required class="w-full border-slate-200 bg-slate-50 border rounded-xl p-3 outline-none text-sm font-bold uppercase focus:border-luma">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Responsável</label>
                        <input type="text" id="vendedor_display" disabled class="w-full bg-slate-100 border-slate-200 border rounded-xl p-3 text-slate-500 font-bold text-sm">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Tipo de Serviço</label>
                    <select id="tipo_servico" class="w-full border-slate-200 bg-slate-50 border rounded-xl p-3 outline-none text-sm font-bold uppercase appearance-none">
                        <option value="comum">Serviço Comum (15 dias)</option>
                        <option value="alianca">Alianças (7 dias)</option>
                        <option value="placa">Gravação de Placa (10 dias)</option>
                        <option value="analise">Análise Técnica (30 dias)</option>
                        <option value="orcamento">Orçamento (20 dias)</option>
                        <option value="banho">Banho/Rodinação (60 dias)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Valor do Serviço</label>
                        <input type="text" id="valor_input_formatado" class="w-full border-slate-200 bg-slate-50 border rounded-xl p-3 outline-none text-sm font-black text-luma" placeholder="R$ 0,00" oninput="formatarMoedaInput(this)">
                        <input type="hidden" id="valor_real_hidden">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-400 uppercase ml-1">WhatsApp Cliente</label>
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000" required class="w-full border-slate-200 bg-slate-50 border rounded-xl p-3 outline-none text-sm font-bold">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Nome do Cliente</label>
                    <input type="text" id="cliente" placeholder="Nome Completo" required class="w-full border-slate-200 bg-slate-50 border rounded-xl p-3 outline-none text-sm font-bold uppercase">
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200 text-center">
                    <input type="file" id="inputFoto" accept="image/*" capture="environment" class="hidden" onchange="previewFoto(this)">
                    <button type="button" onclick="document.getElementById('inputFoto').click()" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-luma font-black text-[10px] uppercase shadow-sm">
                        <i class="fas fa-camera mr-2"></i> Capturar Joia
                    </button>
                    <img id="imgPreview" class="photo-preview mt-3 shadow-md border-2 border-white" src="#" alt="Preview">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Descrição do Defeito/Serviço</label>
                    <textarea id="descricao" placeholder="Ex: Ajustar aro 18 para 20..." required class="w-full border-slate-200 bg-slate-50 border rounded-xl p-3 outline-none text-sm font-medium" rows="3"></textarea>
                </div>
                <button type="submit" class="w-full py-4 bg-luma text-white rounded-2xl font-black shadow-xl shadow-cyan-100 uppercase text-xs tracking-widest active:scale-95 transition">
                    Finalizar e Salvar OS
                </button>
            </form>
        </div>
    </div>

    <!-- Modal Detalhes -->
    <div id="modalDetalhes" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
        <div id="detalhesContent" class="bg-white rounded-3xl shadow-2xl w-full max-w-xl p-8 max-h-[90vh] overflow-y-auto border border-slate-100"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, query, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CREDENCIAIS ATUALIZADAS ---
        const VALID_USERS = { 
            "ADM-MARY": { pass: "818681", nome: "Mary (ADM)", role: "admin" } 
        };

        const MY_FIREBASE_CONFIG = null; 
        
        const STATUS_FLOW = [
            { id: 'loja', label: 'Na Loja', color: 'bg-blue-400', icon: 'fa-store' },
            { id: 'escritorio', label: 'Escritório', color: 'bg-amber-400', icon: 'fa-building' },
            { id: 'ourives', label: 'No Ourives', color: 'bg-purple-400', icon: 'fa-hammer' },
            { id: 'curitiba', label: 'Curitiba', color: 'bg-emerald-500', icon: 'fa-truck' },
            { id: 'revisao', label: 'Revisão', color: 'bg-rose-400', icon: 'fa-eye' },
            { id: 'pronto', label: 'Pronto', color: 'bg-green-500', icon: 'fa-check-circle' }
        ];

        const CONFIG = {
            comum: { dias: 15, label: "Comum", color: "#26c6da" }, 
            alianca: { dias: 7, label: "Aliança", color: "#a3e635" }, 
            placa: { dias: 10, label: "Placa", color: "#f472b6" }, 
            analise: { dias: 30, label: "Análise", color: "#f87171" }, 
            orcamento: { dias: 20, label: "Orçamento", color: "#fbbf24" }, 
            banho: { dias: 60, label: "Banho", color: "#fb923c" } 
        };

        let ordens = [];
        let currentUser = null;
        let base64Foto = "";
        let firestoreEnabled = false;

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        };

        const initSystem = async () => {
            try {
                let config = null;
                if (typeof __firebase_config !== 'undefined') {
                    config = JSON.parse(__firebase_config);
                } else if (MY_FIREBASE_CONFIG) {
                    config = MY_FIREBASE_CONFIG;
                }

                if (config) {
                    const app = initializeApp(config);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'ourives-lumae';

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    firestoreEnabled = true;
                    window.db_instance = db;
                    window.app_id_instance = appId;

                    const osRef = collection(db, 'artifacts', appId, 'public', 'data', 'ordens');
                    onSnapshot(osRef, (snapshot) => {
                        ordens = snapshot.docs.map(doc => ({ fbId: doc.id, ...doc.data() }));
                        localStorage.setItem('ourives_ordens_backup', JSON.stringify(ordens));
                        render();
                        finalizeLoading();
                    }, (err) => {
                        fallbackToLocal();
                    });
                } else {
                    fallbackToLocal();
                }
            } catch (e) {
                fallbackToLocal();
            }
        };

        const fallbackToLocal = () => {
            ordens = JSON.parse(localStorage.getItem('ourives_ordens_backup') || '[]');
            finalizeLoading();
            render();
        };

        const finalizeLoading = () => {
            document.getElementById('loadingOverlay').style.display = 'none';
            checkSession();
        };

        const checkSession = () => {
            const session = localStorage.getItem('ourives_session_v2');
            if (session) {
                currentUser = JSON.parse(session);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('appInterface').classList.remove('hidden');
                document.getElementById('vendedor_display').value = currentUser.nome;
                render();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
            }
        };

        // Função de Login atualizada com as novas credenciais
        window.handleLogin = () => {
            const userKey = document.getElementById('loginUser').value.trim().toUpperCase();
            const pass = document.getElementById('loginPass').value;
            
            if (VALID_USERS[userKey] && VALID_USERS[userKey].pass === pass) {
                currentUser = { id: userKey, ...VALID_USERS[userKey] };
                localStorage.setItem('ourives_session_v2', JSON.stringify(currentUser));
                checkSession();
                showToast("BEM-VINDO(A) MARY");
            } else {
                const err = document.getElementById('loginErrorMessage');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 3000);
            }
        };

        window.logout = () => {
            localStorage.removeItem('ourives_session_v2');
            location.reload();
        };

        window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');

        window.formatarMoedaInput = (input) => {
            let value = input.value.replace(/\D/g, "");
            value = (value / 100).toFixed(2) + "";
            value = value.replace(".", ",");
            value = value.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            input.value = "R$ " + value;
            document.getElementById('valor_real_hidden').value = (input.value.replace("R$ ", "").replace(/\./g, "").replace(",", "."));
        };

        window.previewFoto = (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxW = 600;
                        const scale = maxW / img.width;
                        canvas.width = maxW;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        base64Foto = canvas.toDataURL('image/jpeg', 0.6);
                        const p = document.getElementById('imgPreview');
                        p.src = base64Foto; p.style.display = 'block';
                    };
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.changeStatus = async (id, newStatus) => {
            if (firestoreEnabled) {
                try {
                    const docRef = doc(window.db_instance, 'artifacts', window.app_id_instance, 'public', 'data', 'ordens', id);
                    await updateDoc(docRef, { status: newStatus });
                    showToast("SINCRONIZADO");
                } catch (err) { showToast("ERRO CLOUD"); }
            } else {
                const idx = ordens.findIndex(o => o.fbId === id);
                if(idx !== -1) {
                    ordens[idx].status = newStatus;
                    localStorage.setItem('ourives_ordens_backup', JSON.stringify(ordens));
                    render();
                    showToast("SALVO LOCAL");
                }
            }
            toggleModal('modalDetalhes');
        };

        document.getElementById('formOS').addEventListener('submit', async (e) => {
            e.preventDefault();
            const tipo = document.getElementById('tipo_servico').value;
            const prazo = new Date();
            prazo.setDate(prazo.getDate() + CONFIG[tipo].dias);

            const novaOS = {
                id: document.getElementById('os_id').value,
                cliente: document.getElementById('cliente').value,
                telefone: document.getElementById('telefone').value.replace(/\D/g, ''),
                descricao: document.getElementById('descricao').value,
                vendedorNome: currentUser.nome,
                tipo: tipo,
                valor: document.getElementById('valor_real_hidden').value || 0,
                foto: base64Foto,
                status: 'loja',
                dataPrazo: prazo.toISOString(),
                createdAt: new Date().toISOString()
            };

            if (firestoreEnabled) {
                try {
                    const colRef = collection(window.db_instance, 'artifacts', window.app_id_instance, 'public', 'data', 'ordens');
                    await addDoc(colRef, novaOS);
                    showToast("OS ENVIADA");
                } catch (err) { showToast("ERRO AO SALVAR"); }
            } else {
                novaOS.fbId = 'local-' + Date.now();
                ordens.push(novaOS);
                localStorage.setItem('ourives_ordens_backup', JSON.stringify(ordens));
                render();
                showToast("OS SALVA");
            }
            
            toggleModal('modalNovaOS');
            document.getElementById('formOS').reset();
            document.getElementById('imgPreview').style.display = 'none';
            base64Foto = "";
        });

        const render = () => {
            const board = document.getElementById('kanbanBoard');
            if (!board) return;
            board.innerHTML = '';
            const counts = {};
            
            STATUS_FLOW.forEach(f => {
                counts[f.id] = 0;
                board.innerHTML += `
                    <div class="kanban-col flex-shrink-0 snap-center">
                        <div class="flex items-center justify-between mb-4 px-2">
                            <h3 class="font-black text-slate-400 text-[11px] uppercase tracking-tighter flex items-center gap-2">
                                <i class="fas ${f.icon} ${f.color.replace('bg-', 'text-')}"></i> ${f.label}
                            </h3>
                            <span id="cnt-${f.id}" class="bg-slate-200 text-slate-600 font-black text-[9px] px-2 py-0.5 rounded-full">0</span>
                        </div>
                        <div id="list-${f.id}" class="space-y-4 min-h-[500px] pb-20"></div>
                    </div>
                `;
            });

            const ordensSorted = [...ordens].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            ordensSorted.forEach(os => {
                counts[os.status]++;
                const diff = Math.ceil((new Date(os.dataPrazo) - new Date()) / (1000 * 60 * 60 * 24));
                const list = document.getElementById(`list-${os.status}`);
                if (list) {
                    const card = document.createElement('div');
                    card.className = `os-card p-5 rounded-3xl shadow-sm border-l-4 cursor-pointer bg-white ${diff < 0 && os.status !== 'pronto' ? 'prazo-vencido' : 'border-slate-100'}`;
                    card.style.borderLeftColor = CONFIG[os.tipo].color;
                    card.onclick = () => showDetails(os.fbId);
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-black text-luma bg-cyan-50 px-2 py-1 rounded-lg">#${os.id}</span>
                            <span class="text-[8px] text-slate-300 font-black uppercase tracking-widest">${new Date(os.createdAt).toLocaleDateString()}</span>
                        </div>
                        <h4 class="text-xs font-black text-slate-800 uppercase mb-1 truncate">${os.cliente}</h4>
                        <p class="text-[10px] text-slate-500 font-medium line-clamp-2 leading-relaxed mb-3 uppercase">${os.descricao}</p>
                        <div class="flex justify-between items-center pt-3 border-t border-slate-50">
                            <span class="text-[10px] font-black text-slate-400">R$ ${parseFloat(os.valor || 0).toLocaleString('pt-BR')}</span>
                        </div>
                    `;
                    list.appendChild(card);
                }
            });

            STATUS_FLOW.forEach(f => {
                const badge = document.getElementById(`cnt-${f.id}`);
                if (badge) badge.innerText = counts[f.id] || 0;
            });

            document.getElementById('statsContainer').innerHTML = STATUS_FLOW.map(s => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col items-center">
                    <i class="fas ${s.icon} ${s.color.replace('bg-', 'text-')} text-xs mb-1 opacity-50"></i>
                    <p class="text-[10px] font-black text-slate-800">${counts[s.id] || 0}</p>
                </div>
            `).join('');
        };

        const showDetails = (id) => {
            const os = ordens.find(o => o.fbId === id);
            if (!os) return;
            const content = document.getElementById('detalhesContent');
            
            const statusButtons = STATUS_FLOW
                .filter(s => s.id !== os.status)
                .map(s => `
                    <button onclick="changeStatus('${id}', '${s.id}')" 
                            class="flex flex-col items-center justify-center p-3 rounded-2xl bg-slate-50 border border-slate-100 hover:border-luma hover:bg-cyan-50 transition active:scale-95">
                        <i class="fas ${s.icon} text-slate-300 text-sm mb-1"></i>
                        <span class="text-[8px] font-black text-slate-500 uppercase">${s.label}</span>
                    </button>
                `).join('');

            content.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-black text-white bg-luma px-2 py-0.5 rounded-md uppercase">OS #${os.id}</span>
                        </div>
                        <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tight">${os.cliente}</h2>
                    </div>
                    <button onclick="toggleModal('modalDetalhes')" class="w-10 h-10 flex items-center justify-center bg-slate-50 rounded-full text-slate-300"><i class="fas fa-times"></i></button>
                </div>

                ${os.foto ? `<img src="${os.foto}" class="w-full h-64 object-cover rounded-3xl mb-6 shadow-inner">` : ''}

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Investimento</p>
                        <p class="text-lg font-black text-luma">R$ ${parseFloat(os.valor || 0).toLocaleString('pt-BR')}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Entrega Prevista</p>
                        <p class="text-lg font-black text-slate-700">${new Date(os.dataPrazo).toLocaleDateString()}</p>
                    </div>
                </div>

                <div class="bg-slate-50 p-5 rounded-3xl mb-8">
                    <p class="text-[8px] font-black text-slate-400 uppercase mb-2">Instruções Técnicas</p>
                    <p class="text-sm font-medium text-slate-700 leading-relaxed uppercase">${os.descricao}</p>
                </div>

                <div class="mb-8">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-4 tracking-widest text-center">Atualizar Fluxo</p>
                    <div class="grid grid-cols-3 gap-2">${statusButtons}</div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                     <button onclick="excluirOS('${id}')" class="bg-rose-50 text-rose-500 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition">
                        <i class="fas fa-trash-alt mr-2"></i> Excluir
                    </button>
                    <button onclick="avisarWhatsApp('${id}')" class="bg-green-500 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2 active:scale-95 transition">
                        <i class="fab fa-whatsapp text-lg"></i> Notificar
                    </button>
                </div>
            `;
            toggleModal('modalDetalhes');
        };

        window.excluirOS = async (id) => {
            if(confirm("Deseja apagar esta OS?")) {
                if (firestoreEnabled) {
                    const docRef = doc(window.db_instance, 'artifacts', window.app_id_instance, 'public', 'data', 'ordens', id);
                    await deleteDoc(docRef);
                } else {
                    ordens = ordens.filter(o => o.fbId !== id);
                    localStorage.setItem('ourives_ordens_backup', JSON.stringify(ordens));
                    render();
                }
                showToast("REMOVIDO");
                toggleModal('modalDetalhes');
            }
        };

        window.avisarWhatsApp = (id) => {
            const os = ordens.find(o => o.fbId === id);
            const msg = `Olá ${os.cliente}, sua joia OS #${os.id} está pronta na Lumaê! ✨`;
            window.open(`https://api.whatsapp.com/send?phone=55${os.telefone}&text=${encodeURIComponent(msg)}`, '_blank');
        };

        initSystem();
    </script>
</body>
</html>
